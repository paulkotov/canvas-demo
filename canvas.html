<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snowflakes (Legacy) - Canvas Drawing App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-width: 100vw;
      min-height: 100vh;
      overflow: hidden;
    }

    #canvas {
      background-color: black;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      min-height: 100vh;
      /* max-width: 100vw; */
      /* max-height: 100vh; */
    }

    .controls__container {
      position: absolute;
      z-index: 10;
    }

    .controls__form {
      height: 32px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      /* align-items: center; */
      gap: 8px;
    }

    .controls__form_input {
      min-width: 100px;
      font-size: medium;
    }

    .controls__form_button {
      min-width: 100px;
    }
  </style>
  <div class="controls__container">
    <form name="controls__form" class="controls__form">
      <div class="controls__group">
        <label class="controls__label">Branches</label>
        <input class="controls__input" type="number" name="branches" placeholder="2" min="1" max="5" value="2">
      </div>
      <div class="controls__group">
        <label class="controls__label">Spread</label>
        <input class="controls__input" type="number" name="spread" placeholder="0.5" step="0.1" min="0.1" max="1.5"
          value="0.5">
      </div>
      <div class="controls__group">
        <label class="controls__label">Sides</label>
        <input class="controls__input" type="number" name="sides" placeholder="5" min="3" max="12" value="5">
      </div>
      <div class="controls__group">
        <label class="controls__label">Scale</label>
        <input class="controls__input" type="number" name="scale" placeholder="0.7" step="0.1" min="0.3" max="1"
          value="0.7">
      </div>
      <div class="controls__group">
        <label class="controls__label">Angle</label>
        <input class="controls__input" type="number" name="angle" placeholder="0" min="0" max="180" value="0">
      </div>
      <button class="controls__btn" type="button" id="randomFractal">Random fractal</button>
      <button class="controls__btn" type="button" id="snowflakes">Snowflakes</button>
      <button class="controls__btn" type="submit" id="drawBtn">Draw</button>
      <button class="controls__btn controls__btn--secondary" type="reset">Clear</button>
    </form>
  </div>
  <script type="module">
    import { Canvas } from './js/canvas.js';
    import { get } from './js/utils.js';

    class Fractal {
      context = null;
      params = {};

      constructor(canvasRef, fractalParams) {
        if (!canvasRef || !(canvasRef instanceof HTMLCanvasElement)) {
          throw Error('Error with accessing canvas');
        }
        this.width = canvasRef.width;
        this.height = canvasRef.height;

        const ctx = canvasRef.getContext('2d');
        ctx.lineWidth = get(fractalParams, 'lineWidth', 10);
        ctx.lineCap = 'round';
        ctx.shadowColor = get(fractalParams, 'shadowColor', 'rgba(100, 150, 255, 0.5)');
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.shadowBlur = get(fractalParams, 'shadowBlur', 15);
        this.context = ctx;

        this.params.size = get(fractalParams, 'size', 300);
        this.params.sides = get(fractalParams, 'sides', 5);
        this.params.maxLevel = get(fractalParams, 'maxLevel', 2);
        this.params.scale = get(fractalParams, 'scale', 0.7);
        this.params.spread = get(fractalParams, 'spread', 0.5);
        this.params.branches = get(fractalParams, 'branches', 2);
        this.params.baseHue = get(fractalParams, 'baseHue', 200);
      }

      #drawBranch(level) {
        // TODO: add max level to params
        if (level === undefined || level > this.params.maxLevel) {
          return;
        }
        const hueShift = (level / this.params.maxLevel) * 120;
        this.context.strokeStyle = `hsl(${this.params.baseHue + hueShift}, 100%, 50%)`;

        this.context.beginPath();
        this.context.moveTo(0, 0);
        this.context.lineTo(this.params.size, 0);
        this.context.stroke();

        for (let i = 0; i < this.params.branches; i++) {
          this.context.save();
          this.context.translate(this.params.size - (this.params.size / this.params.branches) * i, 0);
          this.context.rotate(this.params.spread);
          this.context.scale(this.params.scale, this.params.scale);
          this.#drawBranch(level + 1);
          this.context.restore();

          this.context.save();
          this.context.translate(this.params.size - (this.params.size / this.params.branches) * i, 0);
          this.context.rotate(-this.params.spread);
          this.context.scale(this.params.scale, this.params.scale);
          this.#drawBranch(level + 1);
          this.context.restore();
        }
      }

      draw(position, scale, rotate) {
        this.context.save();
        this.context.translate(
          get(position, 'x', this.width / 2),
          get(position, 'y', this.height / 2)
        );
        const scaleValue = scale || this.params.scale || 1;
        this.context.scale(scaleValue, scaleValue);
        this.context.rotate(rotate || 0);

        for (let i = 0; i < this.params.branches; i++) {
          this.context.rotate((Math.PI * 2) / this.params.branches);
          this.#drawBranch(0);
        }
        this.context.restore();
      }
    }

    const getRandomFractalParams = () => {
      return {
        baseHue: Math.floor(Math.random() * 360),
        branches: Math.floor(Math.random() * 5) + 1,
        spread: +(Math.random() * 1.4 + 0.1).toFixed(1),
        sides: Math.floor(Math.random() * 10) + 3,
        scale: +(Math.random() * 0.7 + 0.3).toFixed(1),
        angle: Math.floor(Math.random() * 181),
        randomHue: Math.floor(Math.random() * 360)
      };
    };

    window.addEventListener('load', function () {
      const canvas = new Canvas('canvas');
      const form = document.querySelector('form[name="controls__form"]');
      const drawBtn = document.getElementById('drawBtn');
      const inputs = form.querySelectorAll('input[type="number"]');

      function updateDrawButton() {
        const allFilled = Array.from(inputs).every(input => input.value !== '');
        drawBtn.disabled = !allFilled;
      }

      inputs.forEach(input => input.addEventListener('input', updateDrawButton));
      updateDrawButton();

      let snowflakeTimerId = null;

      const stopSnowflakes = () => {
        if (snowflakeTimerId !== null) {
          clearInterval(snowflakeTimerId);
          snowflakeTimerId = null;
        }
      };

      const getSnowflakeParams = () => ({
        baseHue: Math.floor(Math.random() * 360),
        branches: Math.floor(Math.random() * 3) + 4,
        spread: +(0.3 + Math.random() * 0.6).toFixed(2),
        scale: +(0.4 + Math.random() * 0.2).toFixed(2),
        size: 6 + Math.floor(Math.random() * 7),
        maxLevel: 2,
        lineWidth: 1,
        shadowBlur: 3,
        shadowColor: 'rgba(180, 220, 255, 0.6)',
      });

      const spawnSnowflake = () => {
        const x = Math.random() * canvas.canvas.width;
        const y = Math.random() * canvas.canvas.height;
        const params = getSnowflakeParams();
        const rotation = Math.random() * Math.PI * 2;
        new Fractal(canvas.canvas, params).draw({ x, y }, 1, rotation);
      };

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        stopSnowflakes();
        const branchesInput = form.querySelector('input[name="branches"]');
        const spreadInput = form.querySelector('input[name="spread"]');
        const sidesInput = form.querySelector('input[name="sides"]');
        const angleInput = form.querySelector('input[name="angle"]');
        const scaleInput = form.querySelector('input[name="scale"]');
        const branches = branchesInput.value;
        const spread = spreadInput.value;
        const sides = sidesInput.value;
        const position = {
          x: canvas.canvas.width / 2,
          y: canvas.canvas.height / 2
        };
        const rotation = -angleInput.value * Math.PI / 180;
        new Fractal(canvas.canvas, {
          baseHue: 60,
          branches,
          spread,
          sides,
          scale: scaleInput.value,
          maxLevel: 3
        }).draw(position, 1, rotation);
      });

      form.addEventListener('reset', function (e) {
        e.preventDefault();
        stopSnowflakes();
        const branchesInput = form.querySelector('input[name="branches"]');
        const spreadInput = form.querySelector('input[name="spread"]');
        const sidesInput = form.querySelector('input[name="sides"]');
        const angleInput = form.querySelector('input[name="angle"]');
        const scaleInput = form.querySelector('input[name="scale"]');
        branchesInput.value = '';
        spreadInput.value = '';
        sidesInput.value = '';
        angleInput.value = '';
        scaleInput.value = '';
        canvas.clear();
        updateDrawButton();
      });

      document.getElementById('randomFractal').addEventListener('click', function () {
        stopSnowflakes();
        const randomParams = getRandomFractalParams();
        form.querySelector('input[name="branches"]').value = randomParams.branches;
        form.querySelector('input[name="spread"]').value = randomParams.spread;
        form.querySelector('input[name="sides"]').value = randomParams.sides;
        form.querySelector('input[name="scale"]').value = randomParams.scale;
        form.querySelector('input[name="angle"]').value = randomParams.angle;
        updateDrawButton();

        canvas.clear();
        const position = {
          x: canvas.canvas.width / 2,
          y: canvas.canvas.height / 2
        };
        const rotation = -randomParams.angle * Math.PI / 180;
        new Fractal(canvas.canvas, {
          baseHue: randomParams.baseHue,
          branches: randomParams.branches,
          spread: randomParams.spread,
          sides: randomParams.sides,
          scale: randomParams.scale,
          maxLevel: 3
        }).draw(position, 1, rotation);
      });

      document.getElementById('snowflakes').addEventListener('click', function () {
        stopSnowflakes();
        canvas.clear();
        spawnSnowflake();
        snowflakeTimerId = setInterval(spawnSnowflake, 250);
      });

      window.addEventListener('resize', () => canvas.resize());
    });
  </script>
</body>

</html>
